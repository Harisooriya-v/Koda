<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koda</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="styles.css">
    <!-- Firebase Compat SDKs (Better for GitHub Pages) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <!-- Auth View -->
        <div id="auth-view" class="view">
            <div class="card glass">
                <img src="logo.png" alt="Koda Logo" class="auth-logo">
                <div id="login-form">
                    <input type="email" id="login-username" placeholder="Email Address" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button id="login-btn" class="btn-primary">Login</button>
                    <p>Don't have an account? <a href="#" id="show-register">Register</a></p>
                </div>
                <div id="register-form" class="hidden">
                    <input type="email" id="reg-email" placeholder="Email Address" required>
                    <input type="password" id="reg-password" placeholder="Password (min 6 chars)" required>
                    <button id="register-btn" class="btn-primary">Create Account</button>
                    <p>Already have an account? <a href="#" id="show-login">Login</a></p>
                </div>
            </div>
        </div>

        <!-- App View -->
        <div id="app-view" class="view hidden">
            <header class="glass">
                <div class="header-content">
                    <div class="logo-container">
                        <img src="logo.png" alt="Koda Logo" class="app-logo">
                        <h1>Koda</h1>
                    </div>
                    <div class="user-info">
                        <span id="display-username"></span>
                        <button id="logout-btn" class="btn-secondary">Logout</button>
                    </div>
                </div>
            </header>
            <main>
                <div id="checklist-section">
                    <div class="add-item-container glass">
                        <input type="text" id="new-item-title" placeholder="New task...">
                        <button id="add-item-btn" class="btn-add">+</button>
                    </div>
                    <div id="checklist-container"></div>
                </div>
            </main>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
